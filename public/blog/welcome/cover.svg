<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Blog Cover</title>
  <desc id="desc">Sample cover image for markdown blog post.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1060" cy="100" r="180" fill="#38bdf8" fill-opacity="0.2" />
  <circle cx="140" cy="560" r="220" fill="#60a5fa" fill-opacity="0.2" />
  <text x="80" y="280" fill="#e2e8f0" font-size="74" font-family="Arial, sans-serif" font-weight="700">
    OISCA Blog
  </text>
  <text x="80" y="350" fill="#cbd5e1" font-size="34" font-family="Arial, sans-serif">
    Markdown + Image Content
  </text>
</svg>
